<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에일리언 마피아 게임</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .timer {
            font-size: 4em;
            color: #ffc107;
        }

        .target-btn {
            width: 100%;
            margin: 5px 0;
            background-color: #ff4757;
            color: white;
            font-size: 1.2em;
        }

        .target-btn:hover {
            background-color: #ff6b81;
        }
    </style>
</head>

<body>
    <div id="root">
        <div id="player-container" class="container">
            <h2>플레이어로 참가</h2>
            <input type="text" id="name-input" placeholder="이름을 입력하세요">
            <input type="text" id="code-input" placeholder="초대 코드">
            <button id="join-button">게임 참가</button>
        </div>
        <div id="admin-container" class="container">
            <h2>관리자 모드</h2>
            <button id="admin-button" class="admin-button">관리자 페이지로 이동</button>
        </div>
    </div>
    <script>
        const socket = io('http://localhost:3001');
        const rootDiv = document.getElementById('root');
        const playerContainer = document.getElementById('player-container');
        const adminContainer = document.getElementById('admin-container');

        let amIAlive = true;

        socket.on('connect', () => { console.log('서버에 성공적으로 연결되었습니다.'); });

        socket.on('updateRoom', (room) => {
            if (!amIAlive) return;
            showLobby(room);
        });

        socket.on('roleAssigned', (data) => {
            if (!amIAlive) return;
            showRoleScreen(data.role, data.description);
        });

        socket.on('youAreDead', () => {
            amIAlive = false;
            showDeathScreen();
        });

        // --- '밤' 단계 처리를 위해 수정된 부분 ---
        socket.on('phaseChange', (data) => {
            if (!amIAlive) return;

            if (data.phase === 'meeting') {
                showMeetingScreen(data.day);
            } else if (data.phase === 'night_alien_action') {
                // 에일리언이 아닌 일반 플레이어에게는 '밤' 화면만 보여줍니다.
                showNightScreen();
            }
        });

        // --- 에일리언에게만 오는 특별 이벤트 핸들러 추가 ---
        socket.on('alienAction', (data) => {
            if (!amIAlive) return;
            console.log('에일리언 활동 신호를 받았습니다.', data);
            showAlienActionScreen(data.otherAliens, data.targets);
        });

        socket.on('timerUpdate', (data) => {
            if (!amIAlive) return;

            const timerDisplay = document.getElementById('timer-display');
            if (timerDisplay) {
                const timeLeft = data.timeLeft;
                const minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                seconds = seconds < 10 ? '0' + seconds : seconds;

                if (timeLeft >= 0) {
                    timerDisplay.textContent = minutes + ":" + seconds;
                } else {
                    timerDisplay.textContent = "회의 종료!";
                }
            }
        });

        // 이 함수 전체를 찾아서 교체해주세요
        function showLobby(room) {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';

            const me = room.players.find(p => p.id === socket.id);

            // 관리자가 아직 '게임 시작'을 누르지 않아서 모둠 수가 정해지지 않은 경우
            if (!room.groupCount) {
                const title = document.createElement('h2');
                title.textContent = '대기실';
                const description = document.createElement('p');
                description.textContent = '관리자가 게임 설정을 준비 중입니다. 잠시만 기다려주세요...';
                playerContainer.appendChild(title);
                playerContainer.appendChild(description);
                return; // 여기서 함수 종료
            }

            // 관리자가 게임을 시작했고, 내가 모둠을 선택해야 하는 경우
            if (me && !me.group) {
                const title = document.createElement('h2');
                title.textContent = '모둠을 선택하세요';
                playerContainer.appendChild(title);

                const groupButtonContainer = document.createElement('div');
                for (let i = 1; i <= room.groupCount; i++) {
                    const button = document.createElement('button');
                    button.textContent = `${i}모둠`;
                    button.className = 'group-select-btn';
                    button.dataset.groupNumber = i;
                    button.style.margin = '5px';
                    groupButtonContainer.appendChild(button);
                }
                playerContainer.appendChild(groupButtonContainer);

            } else { // 내가 모둠을 선택한 후 다른 플레이어를 기다리는 경우
                const title = document.createElement('h2');
                title.textContent = '대기실';
                playerContainer.appendChild(title);

                const playerList = document.createElement('ul');
                for (let i = 1; i <= room.groupCount; i++) {
                    const groupHeader = document.createElement('h4');
                    groupHeader.style.color = '#00d1ff';
                    groupHeader.style.borderBottom = '1px solid #00d1ff';
                    groupHeader.style.paddingBottom = '5px';
                    groupHeader.textContent = `${i}모둠`;
                    playerList.appendChild(groupHeader);

                    const groupPlayers = room.players.filter(p => p.group === i);
                    if (groupPlayers.length === 0) {
                        const noPlayerItem = document.createElement('li');
                        noPlayerItem.textContent = '(아직 없음)';
                        noPlayerItem.style.fontStyle = 'italic';
                        noPlayerItem.style.opacity = '0.7';
                        playerList.appendChild(noPlayerItem);
                    } else {
                        groupPlayers.forEach(player => {
                            const playerItem = document.createElement('li');
                            playerItem.textContent = player.name;
                            if (player.status === 'dead') playerItem.classList.add('dead');
                            playerList.appendChild(playerItem);
                        });
                    }
                }
                playerContainer.appendChild(playerList);
            }
        }

        function showRoleScreen(role, description) {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            const title = document.createElement('h2');
            title.textContent = '당신의 역할은...';
            const roleName = document.createElement('h1');
            roleName.textContent = role;
            roleName.style.color = '#ff4757';
            const descP = document.createElement('p');
            descP.textContent = description;
            playerContainer.appendChild(title);
            playerContainer.appendChild(roleName);
            playerContainer.appendChild(descP);
        }

        function showMeetingScreen(day) {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            const title = document.createElement('h2');
            title.textContent = `${day}일차 낮: 회의 시간`;
            const description = document.createElement('p');
            description.textContent = '자유롭게 토론하여 에일리언을 찾아내세요.';
            const timerDisplay = document.createElement('h1');
            timerDisplay.className = 'timer';
            timerDisplay.id = 'timer-display';
            timerDisplay.textContent = '02:00'; // 기본 표시 시간
            playerContainer.appendChild(title);
            playerContainer.appendChild(description);
            playerContainer.appendChild(timerDisplay);
        }

        // --- 화면 표시 함수들 추가 ---
        function showNightScreen() {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            const title = document.createElement('h2');
            title.textContent = '밤이 되었습니다.';
            const description = document.createElement('p');
            description.textContent = '모든 플레이어는 눈을 감아주세요. 에일리언은 활동을 시작합니다.';
            playerContainer.appendChild(title);
            playerContainer.appendChild(description);
        }

        function showAlienActionScreen(otherAliens, targets) {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            const title = document.createElement('h2');
            title.textContent = '오늘 밤의 사냥감을 선택하세요.';

            const comrades = document.createElement('p');
            comrades.textContent = otherAliens.length > 0 ? `(동료 에일리언: ${otherAliens.join(', ')})` : '(동료 에일리언 없음)';

            const targetList = document.createElement('ul');
            targets.forEach(target => {
                const li = document.createElement('li');
                const button = document.createElement('button');
                button.textContent = target.name;
                button.className = 'target-btn'; // 클래스 추가
                button.dataset.targetId = target.id; // 데이터 속성 추가
                li.appendChild(button);
                targetList.appendChild(li);
            });

            playerContainer.appendChild(title);
            playerContainer.appendChild(comrades);
            playerContainer.appendChild(targetList);
        }

        function showDeathScreen() {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            const title = document.createElement('h1');
            title.textContent = '당신은 사망하였습니다';
            title.style.color = '#dc3545';
            const description = document.createElement('p');
            description.textContent = '조용히 사망자 구역으로 이동해주세요.';
            playerContainer.appendChild(title);
            playerContainer.appendChild(description);
        }

        // --- 클릭 이벤트 리스너 수정 ---
        // 이 함수 전체를 찾아서 교체하세요
        rootDiv.addEventListener('click', function (event) {
            if (event.target.id === 'join-button') {
                const nameInput = document.getElementById('name-input');
                const codeInput = document.getElementById('code-input');
                if (nameInput.value.trim() === '' || codeInput.value.trim() === '') {
                    alert('이름과 초대 코드를 모두 입력해주세요.');
                    return;
                }
                socket.emit('joinGame', { name: nameInput.value, code: codeInput.value });
            }
            if (event.target.id === 'admin-button') {
                window.location.href = '/admin';
            }

            // 모둠 선택 버튼 클릭 처리 (새로 추가)
            if (event.target.classList.contains('group-select-btn')) {
                const groupNumber = parseInt(event.target.dataset.groupNumber, 10);
                socket.emit('selectGroup', { groupNumber: groupNumber });
            }

            // 사냥감 선택 버튼 클릭 처리
            if (event.target.classList.contains('target-btn')) {
                const targetId = event.target.dataset.targetId;
                const targetName = event.target.textContent;
                socket.emit('nightAction', { targetId: targetId });
                playerContainer.innerHTML = `<h2>${targetName}님을 선택했습니다.</h2><p>다른 플레이어들의 선택을 기다립니다...</p>`;
            }
        });

    </script>
</body>

</html>
