<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에일리언 마피아 게임</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .timer {
            font-size: 4em;
            color: #ffc107;
        }

        .target-btn {
            width: 100%;
            margin: 5px 0;
            background-color: #ff4757;
            color: white;
            font-size: 1.2em;
        }

        .target-btn:hover {
            background-color: #ff6b81;
        }

        .target-btn.pre-selected {
            background-color: #eccc68;
            color: #2f3542;
            border: 2px solid #ff4757;
        }
    </style>
</head>

<body>
    <div id="root">
        <div id="player-container" class="container">
            <h2>플레이어로 참가</h2>
            <input type="text" id="name-input" placeholder="이름을 입력하세요">
            <input type="text" id="code-input" placeholder="초대 코드">
            <button id="join-button">게임 참가</button>
        </div>
        <div id="admin-container" class="container">
            <h2>관리자 모드</h2>
            <button id="admin-button" class="admin-button">관리자 페이지로 이동</button>
        </div>
    </div>
    <script>
        const socket = io('http://localhost:3001');
        const rootDiv = document.getElementById('root');
        const playerContainer = document.getElementById('player-container');
        const adminContainer = document.getElementById('admin-container');

        let amIAlive = true;

        socket.on('connect', () => { console.log('서버에 성공적으로 연결되었습니다.'); });

        // ★★★ 화면 제어 로직 통합 ★★★
        // 이제 updateRoom 이벤트가 모든 화면 전환을 담당합니다.
        socket.on('updateRoom', (room) => {
            if (!amIAlive) return;

            const me = room.players.find(p => p.id === socket.id);
            if (!me) { // 방에 내가 없으면 초기 화면 표시
                playerContainer.style.display = 'block';
                adminContainer.style.display = 'block';
                return;
            }

            // 게임 상태에 따라 적절한 화면을 렌더링
            if (room.status === 'playing') {
                switch (room.phase) {
                    case 'role_reveal':
                        showRoleScreen(me.role, me.description);
                        break;
                    case 'meeting':
                        showMeetingScreen(room.day);
                        break;
                    case 'night_alien_action':
                        showNightScreen();
                        // 에일리언인 경우, 별도 이벤트(alienAction)가 와서 화면을 덮어씌웁니다.
                        break;
                    default:
                        showLobby(room); // 혹시 모를 예외상황엔 로비 화면으로
                }
            } else { // 'waiting' 상태일 때
                showLobby(room);
            }
        });

        // 이제 phaseChange는 사용되지 않으므로 삭제하거나 주석 처리합니다.
        // socket.on('phaseChange', (data) => { ... });

        // 역할 배정 이벤트는 이제 사용하지 않습니다. updateRoom이 처리합니다.
        // socket.on('roleAssigned', (data) => { ... });

        socket.on('youAreDead', () => {
            amIAlive = false;
            showDeathScreen();
        });

        socket.on('youAreAlive', () => {
            amIAlive = true;
            alert('당신은 부활했습니다! 게임에 다시 참여합니다.');
            // 부활 시에는 서버가 broadcastUpdates를 호출하므로,
            // 자동으로 updateRoom 이벤트가 와서 화면을 갱신해줍니다.
        });

        socket.on('gameOver', (data) => {
            showGameOverScreen(data);
        });

        // 파일 하단의 다른 show... 함수들 근처에 추가하세요.
        function showGameOverScreen(data) {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            playerContainer.style.display = 'block';
            const title = document.createElement('h1');
            title.className = 'game-over-title';
            title.textContent = `${data.winner}의 승리!`;
            const reason = document.createElement('p');
            reason.className = 'game-over-reason';
            reason.textContent = data.reason;
            playerContainer.appendChild(title);
            playerContainer.appendChild(reason);
        }

        socket.on('alienAction', (data) => {
            if (!amIAlive) return;
            showAlienActionScreen(data.otherAliens, data.targets);
        });

        socket.on('timerUpdate', (data) => {
            if (!amIAlive) return;
            const timerDisplay = document.getElementById('timer-display');
            if (timerDisplay) {
                const timeLeft = data.timeLeft;
                const minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                seconds = seconds < 10 ? '0' + seconds : seconds;
                if (timeLeft >= 0) {
                    timerDisplay.textContent = minutes + ":" + seconds;
                } else {
                    timerDisplay.textContent = "회의 종료!";
                }
            }
        });

        socket.on('nightSelectionUpdate', (data) => {
            if (!amIAlive) return;
            const selections = data.selections;
            const allSelectedTargetIds = new Set(Object.values(selections));
            const allTargetButtons = document.querySelectorAll('.target-btn');
            allTargetButtons.forEach(btn => {
                if (allSelectedTargetIds.has(btn.dataset.targetId)) {
                    btn.classList.add('pre-selected');
                } else {
                    btn.classList.remove('pre-selected');
                }
            });
        });

        function showLobby(room) {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            playerContainer.style.display = 'block';
            const title = document.createElement('h2');
            title.textContent = '대기실';
            const playerList = document.createElement('ul');
            room.players.forEach(player => {
                const playerItem = document.createElement('li');
                playerItem.textContent = player.name;
                if (player.status === 'dead') {
                    playerItem.classList.add('dead');
                }
                playerList.appendChild(playerItem);
            });
            playerContainer.appendChild(title);
            playerContainer.appendChild(playerList);
        }

        function showRoleScreen(role, description) {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            playerContainer.style.display = 'block';
            const title = document.createElement('h2');
            title.textContent = '당신의 역할은...';
            const roleName = document.createElement('h1');
            roleName.textContent = role;
            roleName.style.color = '#ff4757';
            const descP = document.createElement('p');
            descP.textContent = description;
            playerContainer.appendChild(title);
            playerContainer.appendChild(roleName);
            playerContainer.appendChild(descP);
        }

        function showMeetingScreen(day) {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            playerContainer.style.display = 'block';
            const title = document.createElement('h2');
            title.textContent = `${day}일차 낮: 회의 시간`;
            const description = document.createElement('p');
            description.textContent = '자유롭게 토론하여 에일리언을 찾아내세요.';
            const timerDisplay = document.createElement('h1');
            timerDisplay.className = 'timer';
            timerDisplay.id = 'timer-display';
            timerDisplay.textContent = '02:00';
            playerContainer.appendChild(title);
            playerContainer.appendChild(description);
            playerContainer.appendChild(timerDisplay);
        }

        function showNightScreen() {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            playerContainer.style.display = 'block';
            const title = document.createElement('h2');
            title.textContent = '밤이 되었습니다.';
            const description = document.createElement('p');
            description.textContent = '모든 플레이어는 눈을 감아주세요. 에일리언은 활동을 시작합니다.';
            playerContainer.appendChild(title);
            playerContainer.appendChild(description);
        }

        function showAlienActionScreen(otherAliens, targets) {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            playerContainer.style.display = 'block';
            const title = document.createElement('h2');
            title.textContent = '오늘 밤의 사냥감을 선택하세요.';
            const comrades = document.createElement('p');
            comrades.textContent = otherAliens.length > 0 ? `(동료 에일리언: ${otherAliens.join(', ')})` : '(동료 에일리언 없음)';
            const targetList = document.createElement('ul');
            targets.forEach(target => {
                const li = document.createElement('li');
                const button = document.createElement('button');
                button.textContent = target.name;
                button.className = 'target-btn';
                button.dataset.targetId = target.id;
                li.appendChild(button);
                targetList.appendChild(li);
            });
            playerContainer.appendChild(title);
            playerContainer.appendChild(comrades);
            playerContainer.appendChild(targetList);
        }

        function showDeathScreen() {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            playerContainer.style.display = 'block';
            const title = document.createElement('h1');
            title.textContent = '당신은 사망하였습니다';
            title.style.color = '#dc3545';
            const description = document.createElement('p');
            description.textContent = '조용히 사망자 구역으로 이동해주세요.';
            playerContainer.appendChild(title);
            playerContainer.appendChild(description);
        }

        rootDiv.addEventListener('click', function (event) {
            if (event.target.id === 'join-button') {
                const nameInput = document.getElementById('name-input');
                const codeInput = document.getElementById('code-input');
                if (nameInput.value.trim() === '' || codeInput.value.trim() === '') {
                    alert('이름과 초대 코드를 모두 입력해주세요.');
                    return;
                }
                socket.emit('joinGame', { name: nameInput.value, code: codeInput.value });
            }

            if (event.target.id === 'admin-button') {
                window.location.href = '/admin';
            }

            if (event.target.classList.contains('target-btn')) {
                const targetId = event.target.dataset.targetId;
                if (event.target.classList.contains('pre-selected')) {
                    socket.emit('nightAction', { targetId: null });
                } else {
                    socket.emit('nightAction', { targetId: targetId });
                }
            }
        });
    </script>
</body>

</html>
