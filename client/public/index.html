<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에일리언 마피아 게임</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="root">
        <div id="player-container" class="container" style="display: block;">
            <div id="initial-screen">
                <h2>플레이어로 참가</h2>
                <input type="text" id="name-input" placeholder="이름을 입력하세요">
                <input type="text" id="code-input" placeholder="초대 코드">
                <button id="join-button">게임 참가</button>
            </div>
        </div>
        <div id="admin-container" class="container" style="display: none;">
            <h2>관리자 모드</h2>
            <button id="admin-button" class="admin-button">관리자 페이지로 이동</button>
        </div>
    </div>

    <script>
        const socket = io();
        const rootDiv = document.getElementById('root');
        const playerContainer = document.getElementById('player-container');
        const adminContainer = document.getElementById('admin-container');

        let amIAlive = true;
        let myRole = '';
        let isEngineerChoiceActive = false; // 엔지니어 선택 화면 활성화 플래그
        let huntSelections = []; // 여왕 능력 선택 저장

        function clearContainer() {
            playerContainer.innerHTML = '';
            adminContainer.style.display = 'none';
            playerContainer.style.display = 'block';
        }

        function showInitialScreen() {
            amIAlive = true;
            myRole = '';
            isEngineerChoiceActive = false;
            playerContainer.style.display = 'block';
            playerContainer.innerHTML = `
                <div id="initial-screen">
                    <h2>플레이어로 참가</h2>
                    <input type="text" id="name-input" placeholder="이름을 입력하세요">
                    <input type="text" id="code-input" placeholder="초대 코드">
                    <button id="join-button">게임 참가</button>
                </div>`;
            adminContainer.style.display = 'block';
        }

        function showLobby(room, container) {
            const targetContainer = container || playerContainer;
            const playerList = room.players.map(player => {
                return `<li class="${player.status === 'dead' ? 'dead' : ''}">${player.name}</li>`;
            }).join('');

            const title = container ? '' : '<h2>대기실</h2>';
            targetContainer.innerHTML = `
                ${title}
                <h3>참가자 목록 (${room.players.length}명)</h3>
                <ul>${playerList}</ul>`;
        }


        function showRoleScreen(role, description) {
            clearContainer();
            myRole = role;
            playerContainer.innerHTML = `
                <h2>당신의 역할은...</h2>
                <h1 style="color: #ff4757;">${role}</h1>
                <p>${description}</p>
                <p style="margin-top: 30px; font-style: italic;">잠시 후 게임이 시작됩니다...</p>`;
        }

        function showMeetingScreen(day) {
            clearContainer();
            playerContainer.innerHTML = `
                <h2>${day}일차 낮: 회의 시간</h2>
                <p>자유롭게 토론하여 에일리언을 찾아내세요.</p>
                <h1 class="timer" id="timer-display">02:00</h1>`;
        }

        function showNightWaitingScreen(text = "밤이 되었습니다. 관리자가 활동을 지시할 때까지 기다려주세요.") {
            clearContainer();
            playerContainer.innerHTML = `
                <h2>밤이 되었습니다</h2>
                <p>${text}</p>`;
        }

        // [신규] 에일리언 일반 사냥 화면
        function showAlienActionScreen(data) {
            if (!amIAlive) return;
            clearContainer();
            const targetButtons = data.targets.map(target => `<li><button class="target-btn" data-ability="alien" data-target-id="${target.id}">${target.name}</button></li>`).join('');
            playerContainer.innerHTML = `<h2>오늘 밤의 사냥감을 선택하세요.</h2>
                <p>${data.otherAliens.length > 0 ? `(동료 에일리언: ${data.otherAliens.join(', ')})` : '(동료 에일리언 없음)'}</p>
                <ul>${targetButtons}</ul>`;
        }

        // [신규] 여왕 사냥 화면
        function showQueenHuntScreen(data) {
            clearContainer();
            huntSelections = [];
            const targetButtons = data.targets.map(target => `<li><button class="target-btn" data-ability="queen_hunt" data-target-id="${target.id}">${target.name}</button></li>`).join('');
            playerContainer.innerHTML = `
                <h2>[사냥] 대상을 2명 선택하세요.</h2>
                <p>(단 한 번만 사용할 수 있는 강력한 능력입니다.)</p>
                <p>${data.otherAliens.length > 0 ? `(동료 에일리언: ${data.otherAliens.join(', ')})` : ''}</p>
                <ul>${targetButtons}</ul>
                <button id="confirm-hunt-btn" disabled>선택 완료 (0/2)</button>
            `;
        }

        // [신규] 여왕 만찬 화면
        function showQueenRampageScreen(data) {
            clearContainer();
            huntSelections = [];
            const targetButtons = data.targets.map(target => `<li><button class="target-btn" data-ability="queen_rampage" data-target-id="${target.id}">${target.name}</button></li>`).join('');
            playerContainer.innerHTML = `
                <h2>[여왕의 만찬] 대상을 4명 선택하세요.</h2>
                <p>(분노에 휩싸여 4명을 공격합니다.)</p>
                <ul>${targetButtons}</ul>
                <button id="confirm-rampage-btn" disabled>선택 완료 (0/4)</button>
            `;
        }

        function showDeathScreen() {
            clearContainer();
            playerContainer.innerHTML = `
                <h1 style="color: #dc3545;">당신은 사망하였습니다</h1>
                <p>조용히 다른 플레이어들의 게임을 관전해주세요.</p>`;
        }

        function showGameOverScreen(data) {
            clearContainer();
            const detailLogHtml = data.detailLog ? `<p style="font-size: 1.2em; color: #ffc107;">${data.detailLog}</p>` : '';
            playerContainer.innerHTML = `
                <h1 class="game-over-title">${data.winner}의 승리!</h1>
                ${detailLogHtml}
                <p class="game-over-reason">${data.reason}</p>`;
        }

        // [수정] 탐사대 능력 사용 화면
        function showCrewActionScreen(room) {
            clearContainer();
            const me = room.players.find(p => p.id === socket.id);
            if (!me) return;

            let abilityContent = `<h4>사용할 수 있는 능력이 없습니다.</h4>`;
            if (me.role === '함장' && me.bullets > 0) {
                const targets = room.players.filter(p => p.status === 'alive' && p.id !== me.id);
                abilityContent = `<h4>즉결 처분할 대상을 선택하세요. <span style="font-weight:normal;">(남은 총알: ${me.bullets}발)</span></h4>
                                  <ul>${targets.map(t => `<li><button class="target-btn" data-ability="captain" data-target-id="${t.id}">${t.name}</button></li>`).join('')}</ul>`;
            } else if (me.role === '군인' && me.bullets > 0) {
                const targets = room.players.filter(p => p.status === 'alive' && p.id !== me.id);
                abilityContent = `<h4>저격할 대상을 선택하세요. <span style="font-weight:normal;">(남은 총알: ${me.bullets}발)</span></h4>
                                  <ul>${targets.map(t => `<li><button class="target-btn" data-ability="soldier" data-target-id="${t.id}">${t.name}</button></li>`).join('')}</ul>`;
            }

            playerContainer.innerHTML = `
                <h2>${room.day}일차 밤: 탐사대 활동</h2>
                <div class="content-container">${abilityContent}</div>
            `;
        }

        // [신규] 엔지니어 선택 화면
        function showEngineerChoiceScreen(isEngineer) {
            isEngineerChoiceActive = true;
            clearContainer();
            const fightButton = `<button data-choice="fight" style="width: 45%; background-color: #28a745;">계속 싸운다</button>`;
            const escapeButton = `<button data-choice="escape" style="width: 45%; background-color: #dc3545;">비상탈출 가동</button>`;
            const notice = isEngineer
                ? `('계속 싸운다' 선택 시 '여왕의 만찬'이, '비상탈출' 선택 시 '인원 분배'의 위기가 찾아올 수 있습니다.)`
                : `엔지니어가 중대한 결정을 내리고 있습니다.`;

            playerContainer.innerHTML = `
                <h2>함장이 사망했습니다.</h2>
                <p>탐사대의 운명을 결정할 시간입니다. ${isEngineer ? '결정을 내려주세요.' : ''}</p>
                <div style="margin-top: 30px; display: flex; gap: 20px; justify-content: center;">
                    ${isEngineer ? fightButton : ''}
                    ${isEngineer ? escapeButton : ''}
                </div>
                <p style="font-size: 0.9em; margin-top: 20px;">${notice}</p>
            `;
        }

        // [신규] 여왕의 만찬 공지 화면
        function showFeastAnnouncedScreen() {
            isEngineerChoiceActive = false;
            clearContainer();
            playerContainer.innerHTML = `
                <h2>여왕의 만찬</h2>
                <p>엔지니어가 계속 싸우는 것을 선택했습니다.</p>
                <p style="color: #ff4757; font-weight: bold;">분노한 에일리언 여왕이 광란 상태에 빠졌습니다!</p>
                <p>잠시 후 관리자가 만찬을 시작합니다...</p>
            `;
        }

        // --- Socket Event Handlers ---
        socket.on('connect', () => console.log('서버에 성공적으로 연결되었습니다.'));
        socket.on('disconnect', () => {
            alert('서버와의 연결이 끊겼습니다. 페이지를 새로고침합니다.');
            location.reload();
        });

        socket.on('updateRoom', (room) => {
            // 특수 상태(엔지니어 선택, 게임오버)에서는 업데이트를 무시
            if (isEngineerChoiceActive || room.status === 'game_over') return;
            const me = room.players.find(p => p.id === socket.id);

            if (!me) { // 내가 방에 없으면 초기화면
                showInitialScreen();
                return;
            }

            if (me.status === 'dead') {
                if (amIAlive) showDeathScreen();
                amIAlive = false;
                return;
            }
            amIAlive = true;

            // 게임 상태에 따른 화면 분기
            if (room.status === 'waiting') {
                showLobby(room);
            } else if (room.status === 'playing') {
                switch (room.phase) {
                    case 'role_reveal': showRoleScreen(me.role, me.description); break;
                    case 'meeting': showMeetingScreen(room.day); break;
                    case 'night_alien_action':
                    case 'night_crew_action':
                        showNightWaitingScreen(); break;
                    default: showLobby(room); break;
                }
            }
        });

        socket.on('youAreDead', () => { if (amIAlive) { amIAlive = false; showDeathScreen(); } });
        socket.on('youAreAlive', () => { amIAlive = true; alert('당신은 부활했습니다!'); });
        socket.on('gameOver', (data) => showGameOverScreen(data));

        // 밤 활동 관련 이벤트
        socket.on('alienAction', (data) => showAlienActionScreen(data));
        socket.on('queenHuntAction', (data) => showQueenHuntScreen(data));
        socket.on('queenRampageAction', (data) => showQueenRampageScreen(data));

        // [신규] 에일리언 선택 실시간 공유
        socket.on('nightSelectionUpdate', (data) => {
            if (!amIAlive || !myRole.includes('에일리언')) return;

            const allSelectedTargetIds = new Set(Object.values(data.selections || {}).flat());
            document.querySelectorAll('.target-btn').forEach(btn => {
                btn.classList.toggle('pre-selected', allSelectedTargetIds.has(btn.dataset.targetId));
            });
        });

        // [신규] 탐사대 능력 사용 단계 시작
        socket.on('crewActionPhaseStarted', (room) => {
            if (amIAlive) {
                showCrewActionScreen(room);
            }
        });

        // 엔지니어 분기 관련 이벤트
        socket.on('captainDiedChoice', (data) => {
            if (amIAlive) showEngineerChoiceScreen(data.isEngineer);
        });

        socket.on('feastAnnounced', () => {
            if (amIAlive) showFeastAnnouncedScreen();
        });

        socket.on('actionConfirmed', () => {
            if (amIAlive) {
                showNightWaitingScreen("선택이 완료되었습니다. 관리자가 다음 단계를 진행할 때까지 기다려주세요.");
            }
        });

        socket.on('timerUpdate', (data) => {
            const timerDisplay = document.getElementById('timer-display');
            if (timerDisplay) {
                const timeLeft = data.timeLeft;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = (timeLeft % 60).toString().padStart(2, '0');
                timerDisplay.textContent = (timeLeft >= 0) ? `${minutes}:${seconds}` : "회의 종료!";
            }
        });

        // --- Event Listeners ---
        rootDiv.addEventListener('click', function (event) {
            const target = event.target;
            if (target.id === 'join-button') {
                const nameInput = document.getElementById('name-input');
                const codeInput = document.getElementById('code-input');
                if (nameInput.value.trim() && codeInput.value.trim()) {
                    socket.emit('joinGame', { name: nameInput.value, code: codeInput.value });
                } else { alert('이름과 초대 코드를 모두 입력해주세요.'); }
                return;
            }

            if (target.id === 'admin-button') {
                window.open('/admin', '_blank');
                return;
            }

            // 엔지니어 선택
            if (target.dataset.choice) {
                isEngineerChoiceActive = false;
                if (target.dataset.choice === 'fight') {
                    if (confirm("'계속 싸운다'를 선택하면 큰 위험이 따를 수 있습니다. 정말 선택하시겠습니까?")) {
                        socket.emit('engineerChoseToFight');
                    }
                } else if (target.dataset.choice === 'escape') {
                    if (confirm("비상탈출을 시작하면 돌이킬 수 없습니다. 정말 가동하시겠습니까?")) {
                        socket.emit('engineerChoseEscape');
                    }
                }
                return;
            }

            // 여왕의 만찬/사냥 확인 버튼
            if (target.id === 'confirm-hunt-btn') {
                if (huntSelections.length === 2) socket.emit('useQueenHunt', { targetIds: huntSelections });
                return;
            }
            if (target.id === 'confirm-rampage-btn') {
                if (huntSelections.length === 4) socket.emit('useQueenRampage', { targetIds: huntSelections });
                return;
            }

            if (target.classList.contains('target-btn')) {
                const abilityType = target.dataset.ability;
                const targetId = target.dataset.targetId;

                // 여왕 능력 (다중 선택)
                if (abilityType === 'queen_hunt' || abilityType === 'queen_rampage') {
                    const isHunt = abilityType === 'queen_hunt';
                    const maxSelection = isHunt ? 2 : 4;
                    const confirmBtn = document.getElementById(isHunt ? 'confirm-hunt-btn' : 'confirm-rampage-btn');

                    const index = huntSelections.indexOf(targetId);
                    if (index > -1) {
                        huntSelections.splice(index, 1);
                        target.classList.remove('selected');
                    } else {
                        if (huntSelections.length < maxSelection) {
                            huntSelections.push(targetId);
                            target.classList.add('selected');
                        }
                    }
                    confirmBtn.textContent = `선택 완료 (${huntSelections.length}/${maxSelection})`;
                    confirmBtn.disabled = huntSelections.length !== maxSelection;
                    return;
                }

                // 그 외 단일 대상 능력
                if (confirm(`'${target.textContent}'님을 대상으로 능력을 사용하시겠습니까?`)) {
                    switch (abilityType) {
                        case 'alien': socket.emit('nightAction', { targetId }); break;
                        case 'soldier': socket.emit('useSoldierAbility', { targetId }); break;
                        case 'captain': socket.emit('useCaptainAbility', { targetId }); break;
                    }
                }
            }
        });
    </script>
</body>

</html>
